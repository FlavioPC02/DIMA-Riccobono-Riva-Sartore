name: hike_core
description: Shared hiking tracking primitives and watch-friendly widgets.
publish_to: 'none'

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  equatable: ^2.0.8
  latlong2: ^0.9.0
  intl: ^0.20.2
  flutter_bloc: ^9.1.1
  bloc_test: ^10.0.0
  flutter_local_notifications: ^20.1.0
  flutter_background_service: ^5.1.0
  geolocator: ^14.0.2
  hive_ce: ^2.15.0
  hive_ce_flutter: ^2.2.0
  get_it: ^9.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  geolocator_platform_interface: ^4.0.0
  mocktail: ^1.0.5
  plugin_platform_interface: ^2.1.8
  build_runner: ^2.9.0

flutter:
  uses-material-design: true